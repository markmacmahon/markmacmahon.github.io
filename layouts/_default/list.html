{{ define "main" }}
<h1>{{ .Title }}</h1>
<ul class="post-list">
  {{ range .Pages.ByParam "series_number" }}
    <li>
      <a href="{{ .RelPermalink }}">
        {{- with .Params.series_number }}<span class="series-num">{{ printf "%02d" . }}</span>{{ end }}
        {{ .Title -}}
      </a>
      <span>{{ if .Params.coming_soon }}Coming soon{{ else }}{{ .Date.Format "02 Jan 2006" }}{{ end }}</span>
    </li>
  {{ end }}
</ul>
{{ end }}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
    <link rel="canonical" href="{{ .Permalink }}" />
    <link rel="stylesheet" href="/css/site.css" />
    {{ with .OutputFormats.Get "RSS" }}<link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ .RelPermalink }}" />{{ end }}
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TXR15D0457"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TXR15D0457');
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a class="brand" href="/">Mark MacMahon</a>
        <nav>
          <a href="/posts/">Posts</a>
        </nav>
      </div>
    </header>
    <main class="wrap">
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer wrap">
      <p>© {{ now.Year }} Mark MacMahon</p>
    </footer>
  </body>
</html>

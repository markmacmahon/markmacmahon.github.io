{{ define "main" }}
<section>
  <h1>Systems-Level Writing</h1>
  <p>{{ site.Params.description }}</p>
</section>

<section>
  <h2>Latest Posts</h2>
  <ul class="post-list">
    {{ range first 10 (where site.RegularPages "Section" "posts") }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <span>{{ .Date.Format "02 Jan 2006" }}</span>
      </li>
    {{ end }}
  </ul>
</section>
{{ end }}

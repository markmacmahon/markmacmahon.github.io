baseURL = 'https://markmacmahon.com/'
ignoreLogs = ['warning-goldmark-raw-html']
languageCode = 'en-ie'
title = 'Mark MacMahon'
enableRobotsTXT = false
buildFuture = true

[pagination]
  pagerSize = 10

[params]
  description = 'Essays on AI, agents, architecture, and leadership from three decades in software.'
  author = 'Mark MacMahon'

[params.social]
  twitter = 'markmacmahon'
  linkedin = 'markmacmahon'

[author]
  name = 'Mark MacMahon'

[permalinks]
  posts = '/posts/:slug/'

[taxonomies]

[sitemap]
  filename = 'sitemap.xml'

[outputs]
  home = ['HTML', 'RSS']

[services]
  [services.rss]
    limit = 20

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false

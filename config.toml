baseURL = 'https://markmacmahon.github.io/mmm_website/'
languageCode = 'en-us'
title = 'Mark MacMahon'
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[params]
  description = 'Essays on AI, agents, architecture, and leadership. Three decades of building software. More memoir than manual.'
  author = 'Mark MacMahon'

[permalinks]
  posts = '/posts/:slug/'

[taxonomies]
  tag = 'tags'

[sitemap]
  changefreq = 'weekly'
  priority = 0.5
  filename = 'sitemap.xml'

[outputs]
  home = ['HTML', 'RSS']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
